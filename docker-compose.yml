services:
  postgres:
    image: postgres:16
    container_name: dnd-postgres
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: dnd_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - dnd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dnd_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dnd_postgres_data:
